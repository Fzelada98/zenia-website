name: Auto-merge sandbox PRs (safety net)

# Catches the case where the zenia-seo-engine agent pushes a commit to a
# claude/* sandbox branch but fails to complete the PR/merge itself. Without
# this, the post never reaches main and GitHub Pages never deploys it.
#
# Strategy: bypass gh pr create (blocked by default org policy) and merge
# directly via git squash merge into main. The token has contents:write.
#
# Triggers:
#  1. push to any claude/* branch (fast path, fires within seconds)
#  2. cron every 30 min (safety net for missed pushes, stuck branches)
#  3. manual workflow_dispatch

on:
  push:
    branches:
      - 'claude/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sweep sandbox branches and squash-merge to main
        run: |
          git fetch origin --prune

          # Identify sandbox branches that have commits NOT yet on main.
          # Use `git cherry` which correctly handles squash-merged branches
          # (unlike --no-merged which false-positives on squash).
          CANDIDATES=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin/claude/ | sed 's|origin/||' | xargs)

          if [ -z "$CANDIDATES" ]; then
            echo "No sandbox branches exist."
            exit 0
          fi

          echo "Candidate sandbox branches: $CANDIDATES"

          MERGED_ANY=false

          for BRANCH in $CANDIDATES; do
            echo ""
            echo "=== Processing $BRANCH ==="

            LATEST_MSG=$(git log "origin/$BRANCH" -1 --pretty=%s 2>/dev/null || echo "")
            if [ -z "$LATEST_MSG" ]; then
              echo "Cannot read latest commit message, skipping."
              continue
            fi
            echo "Latest commit: $LATEST_MSG"

            # Only act on known routine prefixes
            case "$LATEST_MSG" in
              blog:*|haro:*|report:*)
                echo "Prefix matched, proceeding."
                ;;
              *)
                echo "Skipping: commit prefix not a routine output."
                continue
                ;;
            esac

            # Detect squash-merged branches via patch-id equivalence.
            # `git cherry origin/main origin/$BRANCH` lists commits with
            # `+` (not on main by patch) or `-` (already on main by patch).
            UNMERGED=$(git cherry origin/main "origin/$BRANCH" | grep -c '^+' || true)

            if [ "$UNMERGED" = "0" ]; then
              echo "All commits on $BRANCH are already on main (squash-merged). Deleting branch."
              git push origin --delete "$BRANCH" 2>&1 || echo "Delete failed, will retry next run"
              continue
            fi

            echo "$BRANCH has $UNMERGED new commit(s). Squash-merging into main."

            # Squash-merge: apply the changes from the branch as a single commit on main.
            git checkout main
            git pull origin main

            if git merge --squash "origin/$BRANCH"; then
              if git diff --staged --quiet; then
                echo "No staged changes after squash (branch is effectively empty). Deleting."
                git push origin --delete "$BRANCH" 2>&1 || true
                continue
              fi

              git commit -m "$LATEST_MSG (auto-merged from $BRANCH)" || {
                echo "Commit failed, aborting merge of $BRANCH"
                git merge --abort || true
                continue
              }

              # Push main with retry on race condition
              PUSHED=false
              for i in 1 2 3; do
                if git push origin main; then
                  PUSHED=true
                  echo "Push ok on attempt $i"
                  break
                fi
                echo "Push rejected attempt $i, rebasing"
                git pull --rebase origin main || true
                sleep 2
              done

              if [ "$PUSHED" = "true" ]; then
                MERGED_ANY=true
                echo "Successfully merged $BRANCH to main"
                git push origin --delete "$BRANCH" 2>&1 || echo "Branch delete failed, non-fatal"
              else
                echo "Could not push main after 3 attempts for $BRANCH"
              fi
            else
              echo "Squash-merge had conflicts for $BRANCH, skipping. Manual intervention needed."
              git merge --abort || true
            fi
          done

          echo ""
          echo "=== Summary ==="
          echo "Merged any: $MERGED_ANY"
          git log origin/main --oneline -5
