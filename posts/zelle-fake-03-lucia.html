<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 414px; height: 896px; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; background: #ffffff; color: #1a1a1a; }
  .status-bar { height: 44px; background: #ffffff; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; font-size: 14px; font-weight: 600; }
  .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .app-header { background: #d50032; color: white; padding: 14px 18px 18px 18px; display: flex; align-items: center; gap: 12px; }
  .app-header .back { font-size: 22px; font-weight: 300; }
  .app-header .title { font-size: 17px; font-weight: 600; letter-spacing: 0.2px; }
  .app-header .logo { margin-left: auto; font-size: 13px; font-weight: 700; letter-spacing: 1px; }
  .status-block { text-align: center; padding: 36px 20px 18px 20px; }
  .check-circle { width: 78px; height: 78px; border-radius: 50%; background: #00a651; margin: 0 auto 16px auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 44px; font-weight: 700; }
  .status-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .status-sub { font-size: 14px; color: #555; }
  .amount-block { text-align: center; padding: 8px 20px 24px 20px; border-bottom: 1px solid #e5e5e5; }
  .amount { font-size: 48px; font-weight: 300; color: #1a1a1a; letter-spacing: -1px; }
  .amount .currency { font-size: 28px; vertical-align: top; margin-right: 4px; font-weight: 400; }
  .detail { padding: 18px 22px; border-bottom: 1px solid #f0f0f0; }
  .detail .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .detail .value { font-size: 16px; color: #1a1a1a; font-weight: 500; }
  .footer { padding: 24px 22px; }
  .btn { width: 100%; background: #d50032; color: white; text-align: center; padding: 16px; border-radius: 30px; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .btn-link { text-align: center; margin-top: 14px; color: #d50032; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar"><span>11:02</span><span class="right">●●●● 5G ▮▮▮</span></div>
  <div class="app-header">
    <span class="back">‹</span><span class="title">Zelle</span><span class="logo">BANK OF AMERICA</span>
  </div>
  <div class="status-block">
    <div class="check-circle">✓</div>
    <div class="status-title">Payment Received</div>
    <div class="status-sub">May 2, 2026 · 11:00 AM</div>
  </div>
  <div class="amount-block">
    <div class="amount"><span class="currency">$</span>650.<span style="font-size: 32px;">00</span></div>
  </div>
  <div class="detail"><div class="label">From</div><div class="value">Lucia Ramirez</div></div>
  <div class="detail"><div class="label">To</div><div class="value">Carmen A.</div></div>
  <div class="detail"><div class="label">Memo</div><div class="value">Pago semanal restaurante</div></div>
  <div class="detail"><div class="label">Confirmation Number</div><div class="value">ZXC123ASD</div></div>
  <div class="footer"><div class="btn">Done</div><div class="btn-link">View Activity</div></div>
</body>
</html>
