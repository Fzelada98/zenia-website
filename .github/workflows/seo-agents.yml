name: SEO Agents Weekly Cycle

on:
  schedule:
    # Sunday 22:00 UTC -> Performance digest (week-over-week)
    - cron: '0 22 * * 0'
    # Monday 08:00 UTC -> Optimizer (quick wins pos 5-15)
    - cron: '0 8 * * 1'
    # Monday 09:00 UTC -> Strategist (content plan + tracker update)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run manually'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - optimizer
          - strategist
          - all

permissions:
  contents: write

jobs:
  seo-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/seo/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/seo/requirements.txt

      - name: Determine which agent to run
        id: which
        run: |
          # Cron schedule -> agent mapping. Manual dispatch overrides.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agent=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "0 22 * * 0") echo "agent=performance" >> $GITHUB_OUTPUT ;;
              "0 8 * * 1")  echo "agent=optimizer"   >> $GITHUB_OUTPUT ;;
              "0 9 * * 1")  echo "agent=strategist"  >> $GITHUB_OUTPUT ;;
              *)            echo "agent=performance" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run Performance agent
        if: steps.which.outputs.agent == 'performance' || steps.which.outputs.agent == 'all'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GSC_SITE_URL: 'sc-domain:zeniapartners.com'
        run: python -m scripts.seo.agent_performance --force

      - name: Run Optimizer agent
        if: steps.which.outputs.agent == 'optimizer' || steps.which.outputs.agent == 'all'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GSC_SITE_URL: 'sc-domain:zeniapartners.com'
        run: python -m scripts.seo.agent_optimizer --force

      - name: Run Strategist agent
        if: steps.which.outputs.agent == 'strategist' || steps.which.outputs.agent == 'all'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GSC_SITE_URL: 'sc-domain:zeniapartners.com'
        run: python -m scripts.seo.agent_strategist --force

      - name: Commit reports + tracker updates
        run: |
          git config user.name "zenia-seo-bot[bot]"
          git config user.email "zenia-seo-bot@users.noreply.github.com"
          git add reports/seo/ blog/content-tracker.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            AGENT="${{ steps.which.outputs.agent }}"
            git commit -m "seo($AGENT): weekly run $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              if git push; then
                echo "Push ok on attempt $i"
                break
              else
                echo "Push rejected attempt $i, rebasing"
                git pull --rebase origin main || true
                sleep 3
              fi
            done
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-${{ steps.which.outputs.agent }}-${{ github.run_id }}
          path: |
            reports/seo/**/*.html
            reports/seo/cache/*.json
          if-no-files-found: ignore
          retention-days: 30
