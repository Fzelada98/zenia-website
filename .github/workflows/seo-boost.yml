name: Zenia SEO Boost — Indexing + Internal Linking

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'
      - 'es/**'
      - 'index.html'
      - 'about.html'
      - 'sitemap.xml'
  workflow_dispatch:

jobs:
  index-and-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build prioritized URL list from sitemap
        id: urls
        run: node .github/scripts/build-url-list.js

      - name: Submit URLs to IndexNow (Bing + Yandex + Naver)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY not set. Skipping IndexNow."
            exit 0
          fi

          URLS=$(cat urls.json)
          PAYLOAD=$(jq -n \
            --arg host "zeniapartners.com" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyloc "https://zeniapartners.com/${INDEXNOW_KEY}.txt" \
            --argjson urls "$URLS" \
            '{host: $host, key: $key, keyLocation: $keyloc, urlList: $urls}')

          echo "Submitting ${{ steps.urls.outputs.count }} URLs to IndexNow..."
          curl -sL -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" -w "\nHTTP: %{http_code}\n" || true

      - name: Request indexing via GSC API
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GSC_SERVICE_ACCOUNT_JSON" ]; then
            echo "GSC_SERVICE_ACCOUNT_JSON not set. Skipping GSC API indexing request."
            exit 0
          fi

          npm install googleapis --silent
          node .github/scripts/gsc-request-indexing.js

      - name: Identify new blog posts (for internal linking)
        id: new-posts
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep -E '^blog/[^/]+\.html$' | grep -v '^blog/index.html$' || echo "")
          if [ -z "$NEW_FILES" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Update internal links (aggressive cross-linking)
        if: steps.new-posts.outputs.has_new == 'true'
        run: node .github/scripts/update-internal-links.js

      - name: Commit internal link updates (if any)
        if: steps.new-posts.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s blog/) ]]; then
            git add blog/
            git commit -m "chore: auto-update internal links for new post"
            # Retry push with rebase en caso de race condition
            for i in 1 2 3; do
              if git push; then
                echo "Push ok en intento $i"
                break
              else
                echo "Push rechazado, intento $i: pull --rebase"
                git pull --rebase origin main || true
                sleep 2
              fi
            done
          else
            echo "No internal link updates needed."
          fi
