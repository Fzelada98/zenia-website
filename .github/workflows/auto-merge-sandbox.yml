name: Auto-merge sandbox PRs (safety net)

# Catches the case where the zenia-seo-engine agent pushes a commit to a
# claude/* sandbox branch but fails to create/merge the PR itself. Without
# this, the post never reaches main and GitHub Pages never deploys it.
#
# Triggers:
#  1. push to any claude/* branch (fast path, fires within seconds)
#  2. cron every 30 min (safety net for missed pushes, stuck branches)

on:
  push:
    branches:
      - 'claude/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Identify sandbox branches with routine commits
        id: branches
        run: |
          git fetch origin --prune

          # List remote claude/* branches not yet merged to main
          BRANCHES=$(git branch -r --no-merged origin/main | grep -E 'origin/claude/' | sed 's|origin/||' | xargs)

          if [ -z "$BRANCHES" ]; then
            echo "No unmerged sandbox branches."
            echo "list=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Candidate sandbox branches: $BRANCHES"
          echo "list=$BRANCHES" >> $GITHUB_OUTPUT

      - name: Auto-create PR and merge each branch
        if: steps.branches.outputs.list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for BRANCH in ${{ steps.branches.outputs.list }}; do
            echo "=== Processing $BRANCH ==="

            # Only act on branches whose latest commit message starts with a known routine prefix
            LATEST_MSG=$(git log "origin/$BRANCH" -1 --pretty=%s)
            echo "Latest commit: $LATEST_MSG"

            case "$LATEST_MSG" in
              blog:*|haro:*|report:*|chore:*|fix:*|feat:*)
                echo "Prefix matched, proceeding."
                ;;
              *)
                echo "Skipping: commit prefix not a routine output."
                continue
                ;;
            esac

            # Skip if branch has no new commits relative to main
            AHEAD=$(git rev-list --count "origin/main..origin/$BRANCH" || echo 0)
            if [ "$AHEAD" = "0" ]; then
              echo "Branch $BRANCH has no commits ahead of main. Deleting."
              git push origin --delete "$BRANCH" || true
              continue
            fi

            # Does a PR already exist for this branch?
            PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || echo "")

            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR for $BRANCH, creating."
              PR_URL=$(gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "$LATEST_MSG" \
                --body "Auto-created by auto-merge-sandbox workflow. Branch was pushed by an agent that did not complete the PR step." \
                2>&1) || {
                  echo "PR create failed for $BRANCH: $PR_URL"
                  continue
                }
              PR_NUMBER=$(echo "$PR_URL" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+$')
              echo "Created PR #$PR_NUMBER"
            else
              echo "Found existing PR #$PR_NUMBER"
            fi

            # Merge with --admin to bypass required checks (none configured anyway)
            # Fallback chain: squash+admin -> merge+admin -> squash -> merge
            gh pr merge "$PR_NUMBER" --squash --delete-branch --admin 2>&1 || \
              gh pr merge "$PR_NUMBER" --merge --delete-branch --admin 2>&1 || \
              gh pr merge "$PR_NUMBER" --squash --delete-branch 2>&1 || \
              gh pr merge "$PR_NUMBER" --merge --delete-branch 2>&1 || {
                echo "All merge strategies failed for PR #$PR_NUMBER"
                continue
              }

            echo "Merged PR #$PR_NUMBER ($BRANCH)"
          done

      - name: Summary
        if: always()
        run: |
          echo "=== Final state ==="
          git fetch origin --prune
          git log origin/main --oneline -5
