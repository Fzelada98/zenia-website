name: SEO Weekly Report

on:
  schedule:
    # Lunes 14:00 UTC (09:00 Perú, 16:00 Madrid)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis --silent

      - name: Generate weekly SEO report
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: 'sc-domain:zeniapartners.com'
          GSC_SITE_LABEL: 'Zenia Partners'
          BLOG_DIR: 'blog'
          BACKEND_URL: 'https://zenia-backend-y6hp.onrender.com'
        run: node .github/scripts/seo-weekly-report.js

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/seo-weekly/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "report: weekly SEO $(date +%Y-%m-%d)"
            git push
          fi

      - name: Send weekly email (CEO dashboard)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: 'fabrizzio.zelada@zeniapartners.com'
          FROM_EMAIL: 'Zenia Partners <onboarding@resend.dev>'
          GSC_SITE_LABEL: 'Zenia Partners'
          REPORT_TYPE: 'ceo'
        run: node .github/scripts/send-weekly-email.js
