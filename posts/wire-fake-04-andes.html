<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { width: 414px; height: 896px; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; background: #f6f7f8; color: #1a1a1a; }
  .status-bar { height: 44px; background: #ffffff; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; font-size: 14px; font-weight: 600; }
  .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .header { background: #ffffff; padding: 16px 18px 16px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e5e5e5; }
  .header .back { font-size: 22px; font-weight: 300; color: #006fcf; }
  .header .title { font-size: 17px; font-weight: 600; letter-spacing: 0.2px; color: #1a1a1a; }
  .header .logo { margin-left: auto; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #006fcf; }

  .card { background: #ffffff; margin: 16px 16px 0 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 24px 20px; text-align: center; }
  .check-circle { width: 64px; height: 64px; border-radius: 50%; background: #006fcf; margin: 0 auto 14px auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 700; }
  .status-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .status-sub { font-size: 13px; color: #666; }
  .amount { font-size: 42px; font-weight: 300; color: #1a1a1a; letter-spacing: -1px; margin-top: 16px; }
  .amount .currency { font-size: 24px; vertical-align: top; margin-right: 3px; font-weight: 400; }
  .badge { display: inline-block; background: #fff3cd; color: #8b6914; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-top: 8px; }

  .detail-card { background: #ffffff; margin: 12px 16px 0 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 4px 0; }
  .detail { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
  .detail:last-child { border-bottom: none; }
  .detail .label { font-size: 13px; color: #666; }
  .detail .value { font-size: 14px; color: #1a1a1a; font-weight: 600; text-align: right; max-width: 60%; }
  .footer { padding: 24px 22px; }
  .btn { width: 100%; background: #006fcf; color: white; text-align: center; padding: 16px; border-radius: 30px; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
</style>
</head>
<body>
  <div class="status-bar"><span>14:08</span><span class="right">●●●● 5G ▮▮▮</span></div>
  <div class="header">
    <span class="back">‹</span><span class="title">Wire Transfer</span><span class="logo">CHASE BUSINESS</span>
  </div>
  <div class="card">
    <div class="check-circle">↑</div>
    <div class="status-title">Wire Sent</div>
    <div class="status-sub">May 1, 2026 · 2:08 PM</div>
    <div class="amount"><span class="currency">$</span>2,800.<span style="font-size: 28px;">00</span></div>
    <div class="badge">DOMESTIC WIRE</div>
  </div>
  <div class="detail-card">
    <div class="detail"><div class="label">To</div><div class="value">Logistica Andes LLC</div></div>
    <div class="detail"><div class="label">Account</div><div class="value">****8821</div></div>
    <div class="detail"><div class="label">Memo</div><div class="value">Flete contenedor #C-2204</div></div>
    <div class="detail"><div class="label">Reference</div><div class="value">WT2026050108821</div></div>
    <div class="detail"><div class="label">Status</div><div class="value" style="color:#00a651;">Completed</div></div>
  </div>
  <div class="footer"><div class="btn">Done</div></div>
</body>
</html>
