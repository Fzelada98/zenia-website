<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Unsubscribe — Zenia Partners</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 60px 20px;
    color: #0F172A;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    max-width: 500px;
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 8px 32px rgba(15,23,42,0.08);
    border: 1px solid #e5e9f2;
    text-align: center;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo img { width: 40px; height: 40px; border-radius: 8px; }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: #0F172A; }
  h1 { font-size: 24px; margin: 0 0 16px 0; color: #0F172A; }
  p { font-size: 15px; color: #475569; margin: 0 0 24px 0; }
  .email {
    background: #f8faff;
    border: 1px solid #e0e7ff;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #2563EB;
    margin-bottom: 24px;
  }
  button {
    background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .success {
    background: #d1fae5;
    border: 1px solid #86efac;
    color: #059669;
    padding: 14px;
    border-radius: 8px;
    margin-top: 20px;
    display: none;
    font-weight: 600;
  }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #94a3b8;
  }
  .footer a { color: #2563EB; text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="/assets/logos/zenia-logo.png" alt="Zenia">
    <span class="logo-text">ZENIA</span>
  </div>

  <h1>Dejar de recibir informes</h1>
  <p>¿Quieres cancelar la suscripción a los informes semanales de Zenia Partners?</p>

  <div class="email" id="email-display">—</div>

  <button id="unsub-btn" onclick="unsubscribe()">Sí, cancelar suscripción</button>

  <div class="success" id="success-msg">
    ✅ Recibido. Te hemos dado de baja de los informes semanales.<br>
    <span style="font-size:13px;font-weight:normal;">Procesamos la solicitud en menos de 24h.</span>
  </div>

  <div class="footer">
    ¿Necesitas algo más? Escribe a <a href="mailto:reports@zeniapartners.com">reports@zeniapartners.com</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email') || '';
  document.getElementById('email-display').textContent = email || 'tu correo';

  function unsubscribe() {
    const btn = document.getElementById('unsub-btn');
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    // Log to console + localStorage for later review
    console.log('Unsubscribe requested:', email);
    try {
      const list = JSON.parse(localStorage.getItem('zenia-unsubs') || '[]');
      list.push({ email, date: new Date().toISOString() });
      localStorage.setItem('zenia-unsubs', JSON.stringify(list));
    } catch (e) {}

    setTimeout(() => {
      btn.style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }, 800);
  }
</script>

</body>
</html>
